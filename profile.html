<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyro - Developer Kyro MD</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --purple-1: #8b5cf6;
            --purple-2: #a855f7;
            --purple-3: #7c3aed;
            --purple-glow: rgba(139, 92, 246, 0.6);
            --purple-soft: rgba(139, 92, 246, 0.3);
            --text: #e2e8f0;
            --text-muted: #c4b5fd;
            --card-bg: rgba(20, 20, 20, 0.7);
            --border: rgba(139, 92, 246, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* === CANVAS PARTIKEL === */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* === KONTEN UTAMA === */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px 25px;
            max-width: 460px;
            width: 90%;
        }

        /* === WRAPPER FOTO === */
        .photo-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: floatPhoto 4s ease-in-out infinite;
        }
        .photo-wrapper:hover {
            transform: scale(1.06);
        }
        .photo-wrapper:active {
            transform: scale(0.95);
        }

        @keyframes floatPhoto {
            0%,
            100% {
                transform: translateY(0);
            }
            25% {
                transform: translateY(-8px);
            }
            50% {
                transform: translateY(-2px);
            }
            75% {
                transform: translateY(-10px);
            }
        }

        /* Cincin glow ungu */
        .photo-glow-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: transparent;
            border: 3px solid transparent;
            background-clip: padding-box;
            z-index: -1;
            animation: glowPulse 2.5s ease-in-out infinite;
            box-shadow:
                0 0 25px var(--purple-glow),
                0 0 55px var(--purple-soft),
                0 0 90px rgba(124, 58, 237, 0.25),
                inset 0 0 25px rgba(139, 92, 246, 0.1);
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 25px var(--purple-glow), 0 0 55px var(--purple-soft), 0 0 90px rgba(124, 58, 237, 0.25), inset 0 0 25px rgba(139, 92, 246, 0.1);
            }
            50% {
                box-shadow: 0 0 45px var(--purple-glow), 0 0 80px rgba(168, 85, 247, 0.55), 0 0 120px rgba(124, 58, 237, 0.4), inset 0 0 40px rgba(139, 92, 246, 0.2);
            }
        }

        /* Cincin orbit kecil */
        .photo-orbit {
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            border: 1.5px dashed rgba(139, 92, 246, 0.45);
            animation: spinOrbit 8s linear infinite;
            pointer-events: none;
        }
        .photo-orbit::before {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #c084fc;
            border-radius: 50%;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 14px #c084fc, 0 0 28px #a855f7;
        }
        @keyframes spinOrbit {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Foto */
        .profile-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid rgba(139, 92, 246, 0.55);
            box-shadow:
                0 0 30px rgba(139, 92, 246, 0.35),
                0 0 60px rgba(124, 58, 237, 0.2),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }
        .photo-wrapper:hover .profile-photo {
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow:
                0 0 45px rgba(139, 92, 246, 0.55),
                0 0 80px rgba(124, 58, 237, 0.35),
                inset 0 0 25px rgba(0, 0, 0, 0.4);
        }

        /* === TEKS === */
        .text-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 2px;
        }
        .greeting {
            font-size: 1.55rem;
            font-weight: 700;
            color: #f5f3ff;
            letter-spacing: 0.3px;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            line-height: 1.35;
        }
        .greeting .highlight {
            background: linear-gradient(135deg, #c084fc, #a855f7, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            text-shadow: none;
            animation: shimmerText 3s ease-in-out infinite;
        }
        @keyframes shimmerText {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.5);
            }
        }
        .subtitle {
            font-size: 0.95rem;
            color: #c4b5fd;
            font-weight: 500;
            letter-spacing: 0.4px;
            opacity: 0.9;
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        /* === DIVIDER === */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a855f7, #8b5cf6, #a855f7, transparent);
            border-radius: 1px;
            margin: 4px 0;
            animation: dividerGlow 2s ease-in-out infinite;
        }
        @keyframes dividerGlow {
            0%,
            100% {
                opacity: 0.7;
                width: 60px;
            }
            50% {
                opacity: 1;
                width: 90px;
            }
        }

        /* === BUTTONS === */
        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 4px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: #e9d5ff;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2), inset 0 0 0 rgba(139, 92, 246, 0);
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(124, 58, 237, 0.1), rgba(168, 85, 247, 0.15));
            opacity: 0;
            transition: opacity 0.35s ease;
            z-index: 0;
        }
        .btn:hover {
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5), 0 0 65px rgba(124, 58, 237, 0.3), inset 0 0 30px rgba(139, 92, 246, 0.15);
            transform: translateY(-3px);
            color: #ffffff;
            text-shadow: 0 0 18px rgba(168, 85, 247, 0.7);
        }
        .btn:hover::before {
            opacity: 1;
        }
        .btn:active {
            transform: translateY(0) scale(0.97);
            transition: all 0.1s ease;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        .btn span {
            position: relative;
            z-index: 1;
        }
        .btn .icon {
            position: relative;
            z-index: 1;
            font-size: 1.15rem;
            filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.5));
        }

        /* Variasi warna subtle per button */
        .btn-telegram {
            border-color: rgba(0, 136, 204, 0.5);
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.25), inset 0 0 0 rgba(0, 136, 204, 0);
        }
        .btn-telegram:hover {
            border-color: rgba(0, 170, 255, 0.8);
            box-shadow: 0 0 30px rgba(0, 150, 220, 0.5), 0 0 60px rgba(0, 136, 204, 0.35), inset 0 0 30px rgba(0, 136, 204, 0.15);
            text-shadow: 0 0 18px rgba(0, 180, 255, 0.7);
        }
        .btn-telegram::before {
            background: linear-gradient(135deg, rgba(0, 136, 204, 0.2), rgba(0, 100, 180, 0.1), rgba(0, 160, 220, 0.15));
        }

        .btn-community {
            border-color: rgba(139, 92, 246, 0.5);
        }
        .btn-community:hover {
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.55), 0 0 60px rgba(124, 58, 237, 0.4), inset 0 0 30px rgba(139, 92, 246, 0.18);
        }
        .btn-community::before {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(124, 58, 237, 0.12), rgba(168, 85, 247, 0.18));
        }

        .btn-tiktok {
            border-color: rgba(255, 0, 80, 0.45);
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.2), inset 0 0 0 rgba(255, 0, 80, 0);
        }
        .btn-tiktok:hover {
            border-color: rgba(255, 50, 110, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.5), 0 0 60px rgba(255, 30, 90, 0.35), inset 0 0 30px rgba(255, 0, 80, 0.12);
            text-shadow: 0 0 18px rgba(255, 100, 140, 0.7);
        }
        .btn-tiktok::before {
            background: linear-gradient(135deg, rgba(255, 0, 80, 0.2), rgba(200, 0, 60, 0.1), rgba(255, 50, 100, 0.12));
        }

        .btn-youtube {
            border-color: rgba(255, 0, 0, 0.45);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2), inset 0 0 0 rgba(255, 0, 0, 0);
        }
        .btn-youtube:hover {
            border-color: rgba(255, 60, 60, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5), 0 0 60px rgba(220, 20, 20, 0.35), inset 0 0 30px rgba(255, 0, 0, 0.12);
            text-shadow: 0 0 18px rgba(255, 80, 80, 0.7);
        }
        .btn-youtube::before {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(180, 0, 0, 0.1), rgba(255, 40, 40, 0.12));
        }

        /* === RESPONSIVE === */
        @media (max-width: 400px) {
            .photo-wrapper {
                width: 120px;
                height: 120px;
            }
            .photo-glow-ring {
                inset: -6px;
            }
            .photo-orbit {
                inset: -13px;
            }
            .greeting {
                font-size: 1.3rem;
            }
            .subtitle {
                font-size: 0.85rem;
            }
            .btn {
                padding: 12px 18px;
                font-size: 0.85rem;
                border-radius: 40px;
            }
            .btn::before {
                border-radius: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas Partikel -->
    <canvas id="particleCanvas"></canvas>

    <!-- Konten -->
    <div class="main-container">
        <!-- Foto Profil -->
        <div class="photo-wrapper" title="Kyro - Developer Kyro MD">
            <div class="photo-glow-ring"></div>
            <div class="photo-orbit"></div>
            <img
            class="profile-photo"
            src="https://files.catbox.moe/n0aam9.jpg"
            alt="Kyro"
            loading="eager"
            draggable="false"
            />
        </div>

        <!-- Teks Perkenalan -->
        <div class="text-group">
            <p class="greeting">halo cuy perkenalkan gw <span class="highlight">kyro</span></p>
            <p class="subtitle">developer dari script kyro md</p>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Tombol -->
        <div class="buttons-group">
            <!-- Telegram -->
            <a href="https://t.me/kyrodark" target="_blank" rel="noopener noreferrer" class="btn btn-telegram">
                <span class="icon">.</span>
                <span>telegram gw</span>
            </a>

            <!-- Kyro Community -->
            <a href="https://t.me/aboutkyro1" target="_blank" rel="noopener noreferrer" class="btn btn-community">
                <span class="icon">.</span>
                <span>Kyro community</span>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@yasirstylejj" target="_blank" rel="noopener noreferrer" class="btn btn-tiktok">
                <span class="icon">.</span>
                <span>akun tiktok</span>
            </a>

            <!-- YouTube -->
            <a href="https://www.youtube.com/@alwayskyro" target="_blank" rel="noopener noreferrer" class="btn btn-youtube">
                <span class="icon">.</span>
                <span>akun youtube</span>
            </a>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let particles = [];
            const particleCount = 90;
            const connectionDistance = 130;
            const mouse = { x: -9999, y: -9999 };
            const purplePalette = [
                'rgba(139, 92, 246,', // #8b5cf6
                'rgba(168, 85, 247,', // #a855f7
                'rgba(124, 58, 237,', // #7c3aed
                'rgba(192, 132, 252,', // #c084fc
                'rgba(147, 51, 234,', // #9333ea
                'rgba(167, 139, 250,', // #a78bfa
            ];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // Tracking mouse
            document.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            document.addEventListener('mouseleave', () => {
                mouse.x = -9999;
                mouse.y = -9999;
            });
            // Touch
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouse.x = e.touches[0].clientX;
                    mouse.y = e.touches[0].clientY;
                }
            }, { passive: true });
            document.addEventListener('touchend', () => {
                mouse.x = -9999;
                mouse.y = -9999;
            });

            class Particle {
                constructor() {
                    this.reset(true);
                }
                reset(initial = false) {
                    this.x = initial ? Math.random() * width : Math.random() * width;
                    this.y = initial ? Math.random() * height : Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.7;
                    this.vy = (Math.random() - 0.5) * 0.7;
                    this.size = Math.random() * 2.5 + 0.8;
                    this.colorIndex = Math.floor(Math.random() * purplePalette.length);
                    this.opacity = Math.random() * 0.7 + 0.3;
                    this.twinkleSpeed = Math.random() * 0.015 + 0.005;
                    this.twinkleOffset = Math.random() * Math.PI * 2;
                }
                update() {
                    // Gerakan
                    this.x += this.vx;
                    this.y += this.vy;

                    // Bungkus posisi (wrap around)
                    if (this.x < -20) this.x = width + 20;
                    if (this.x > width + 20) this.x = -20;
                    if (this.y < -20) this.y = height + 20;
                    if (this.y > height + 20) this.y = -20;

                    // Twinkle opacity
                    this.currentOpacity = this.opacity * (0.55 + 0.45 * Math.sin(Date.now() * this.twinkleSpeed + this
                        .twinkleOffset));
                }
                draw(ctx) {
                    const alpha = Math.max(0.15, this.currentOpacity);
                    const color = purplePalette[this.colorIndex] + alpha + ')';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                    // Glow kecil
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = purplePalette[this.colorIndex] + (alpha * 0.25) + ')';
                    ctx.fill();
                }
            }

            // Inisialisasi partikel
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < connectionDistance) {
                            const alpha = (1 - dist / connectionDistance) * 0.4;
                            const gradient = ctx.createLinearGradient(
                                particles[i].x, particles[i].y,
                                particles[j].x, particles[j].y
                            );
                            const c1 = purplePalette[particles[i].colorIndex] + alpha + ')';
                            const c2 = purplePalette[particles[j].colorIndex] + alpha + ')';
                            gradient.addColorStop(0, c1);
                            gradient.addColorStop(1, c2);

                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = gradient;
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                        }
                    }
                }
            }

            function drawMouseConnections() {
                if (mouse.x < -500 || mouse.y < -500) return;
                for (let i = 0; i < particles.length; i++) {
                    const dx = particles[i].x - mouse.x;
                    const dy = particles[i].y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const mouseRange = 160;

                    if (dist < mouseRange) {
                        const alpha = (1 - dist / mouseRange) * 0.55;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = 'rgba(192, 132, 252,' + alpha + ')';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();

                        // Tarik partikel sedikit ke arah mouse
                        const force = (1 - dist / mouseRange) * 0.03;
                        particles[i].vx += dx * force * 0.005;
                        particles[i].vy += dy * force * 0.005;
                        // Batasi kecepatan
                        const speed = Math.sqrt(particles[i].vx ** 2 + particles[i].vy ** 2);
                        const maxSpeed = 1.2;
                        if (speed > maxSpeed) {
                            particles[i].vx = (particles[i].vx / speed) * maxSpeed;
                            particles[i].vy = (particles[i].vy / speed) * maxSpeed;
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);

                // Update & draw particles
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw(ctx);
                }

                drawConnections();
                drawMouseConnections();

                requestAnimationFrame(animate);
            }

            animate();

            // Redraw on resize to reposition particles properly
            window.addEventListener('resize', () => {
                for (let p of particles) {
                    p.x = Math.min(p.x, width);
                    p.y = Math.min(p.y, height);
                }
            });
        })();
    </script>
</body>
</html>
